name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  KPI_MAX_FAILURE_RATE: "0.01"
  KPI_MAX_FALLBACK_RATE: "0.05"
  KPI_MAX_SEARCH_P95_MS: "2500"
  KPI_MAX_DETAIL_P95_MS: "1500"

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_e2e: false
          - os: macos-latest
            run_e2e: true
          - os: windows-latest
            run_e2e: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run verify suite
        run: npm run ci:verify

      - name: Run E2E smoke
        if: matrix.run_e2e
        run: npm run e2e | tee e2e-app.log

      - name: Build KPI report from E2E logs
        if: matrix.run_e2e
        run: npm run logs:kpi -- e2e-app.log | tee e2e-kpi-report.txt

      - name: Run KPI check from E2E logs
        if: matrix.run_e2e
        run: >
          npm run logs:kpi:check --
          --max-failure-rate=${{ env.KPI_MAX_FAILURE_RATE }}
          --max-fallback-rate=${{ env.KPI_MAX_FALLBACK_RATE }}
          --max-search-p95-ms=${{ env.KPI_MAX_SEARCH_P95_MS }}
          --max-detail-p95-ms=${{ env.KPI_MAX_DETAIL_P95_MS }}
          e2e-app.log

      - name: Upload E2E logs
        if: matrix.run_e2e && always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.os }}
          path: |
            e2e-app.log
            e2e-kpi-report.txt
          if-no-files-found: warn

  package:
    name: Package (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Release preflight
        env:
          GITHUB_REF: ${{ github.ref }}
          RELEASE_SIGNING_REQUIRED: ${{ startsWith(github.ref, 'refs/tags/v') }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:preflight

      - name: Build distributables (signed when secrets are provided)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
            dist/mac*/
            dist/win*/
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.blockmap
            release-artifacts/**/latest*.yml
